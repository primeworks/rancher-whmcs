name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy module files to cPanel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy modules/ to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          protocol: ftp
          local-dir: ./modules/
          server-dir: /www/host.webdiscode.com/modules/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deploy includes/ to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          protocol: ftp
          local-dir: ./includes/
          server-dir: /www/host.webdiscode.com/includes/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
